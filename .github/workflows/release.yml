name: Release on main push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Go Semantic Release
        id: semrel
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          update-file: internal/awslogin/constants.go

      - name: Commit version update
        if: ${{ steps.semrel.outputs.version != '' }}
        run: |
          if git diff --quiet -- internal/awslogin/constants.go; then
            echo "No version update to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add internal/awslogin/constants.go
          git commit -m "chore: update version to v${{ steps.semrel.outputs.version }} [skip release] [skip ci]"
          git push
